{% extends "base.html" %}

{% block title %}Log In - AquaTrack Pro{% endblock %}

{% block content %}
<div class="glass-card animate-fade-in" style="max-width: 400px; margin: 4rem auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted);">Please log in to your account</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field.errors }}
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-input" required>
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="{% url 'register' %}">Sign up</a
    </div>
</div>
{% endblock %}
